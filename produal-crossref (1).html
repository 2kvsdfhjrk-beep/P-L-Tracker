<style>
:root{--navy:#16283F;--navy2:#1F3864;--paper:#F4F5F8;--card:#fff;--ink:#1B2430;--mut:#5C6675;--line:#E4E8EE;

*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);padding-bottom:calc(70px + env(safe-area-inset-bottom))}
.wrap{max-width:760px;margin:0 auto}
#errbar{display:none;background:#B3261E;color:#fff;font-size:12px;padding:8px 14px;line-height:1.4}
header{background:linear-gradient(180deg,#122136,#16283F);color:#fff;padding:calc(10px + env(safe-area-inset-top)) 0 12px;position:sticky;top:0;z-index:30;box-shadow:0 2px 14px rgba(10,20,35,.3)}
.brand{display:flex;align-items:baseline;gap:8px;padding:2px 16px 9px}
.brand b{font-size:17px}.brand span{font-size:11px;color:#8FA3C0}
.searchrow{padding:0 16px;position:relative}
#q{width:100%;padding:13px 42px;font-size:16px;border:none;border-radius:13px;background:#fff;color:var(--ink);outline:none;font-family:var(--mono);font-weight:600}
#q::placeholder{color:#9AA3B2;font-family:var(--sans);font-weight:400}
.mag{position:absolute;left:30px;top:50%;transform:translateY(-50%);color:#8A94A3;font-size:16px;pointer-events:none}
#clearq{position:absolute;right:27px;top:50%;transform:translateY(-50%);border:none;background:#E4E8EE;color:#5C6675;width:24px;height:24px;border-radius:50%;font-size:15px;cursor:pointer;display:none;line-height:1}
#suggest{position:absolute;left:16px;right:16px;top:calc(100% + 6px);background:#fff;border-radius:12px;box-shadow:0 10px 30px rgba(10,20,35,.25);overflow:hidden;display:none;z-index:40}
#suggest .srow{display:flex;align-items:baseline;gap:10px;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer}
#suggest .srow:last-child{border-bottom:none}
#suggest .sc{font-family:var(--mono);font-weight:700;font-size:13px;white-space:nowrap}
#suggest .sd{font-size:11.5px;color:var(--mut);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sb{font-size:9px;font-weight:700;color:#fff;border-radius:4px;padding:2px 5px;flex:0 0 auto}
.sb.son{background:var(--son)}.sb.sie{background:var(--sie)}.sb.bel{background:var(--bel)}
.filters{display:flex;gap:6px;overflow-x:auto;padding:10px 16px 0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fchip{flex:0 0 auto;font-size:11.5px;font-weight:600;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.1);color:#C9D4E4;border:1px solid rgba(255,255,255,.16);cursor:pointer;display:flex;align-items:center;gap:5px}
.fchip.on{background:#fff;color:var(--navy)}
.fchip .fd{width:7px;height:7px;border-radius:50%}
main{padding-top:12px}.view{display:none}.view.on{display:block}
.hint{font-size:12px;color:var(--mut);padding:0 16px 10px;line-height:1.5}
.res{padding:0 12px}
.stats{display:flex;gap:8px;padding:2px 12px 12px}
.stat{flex:1;background:#fff;border:1px solid var(--line);border-radius:14px;padding:11px 8px;text-align:center;box-shadow:var(--shadow)}
.stat .n{font-size:17px;font-weight:800;color:var(--navy2);font-family:var(--mono)}
.stat .l{font-size:9px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.recents{padding:0 16px 6px;display:flex;gap:6px;flex-wrap:wrap}
.pillbtn{font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 11px;border-radius:8px;border:1px solid var(--line);background:#fff;color:var(--navy2);cursor:pointer}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow)}
.qhit{border-bottom:1px solid var(--line);padding:8px 14px;font-size:12px;line-height:1.4}
.qhit.son{background:var(--sonbg);color:var(--son)}.qhit.sie{background:var(--siebg);color:var(--sie)}.qhit.bel{background:var(--belbg);color:var(--bel)}
.qhit b{font-family:var(--mono)}
.top{display:flex;border-bottom:1px solid var(--line)}
.side{flex:1;padding:12px 14px;min-width:0}
.side.them{background:#FAFBFC}
.side.us{background:linear-gradient(180deg,#FDFBF4,#fff);border-left:1px solid var(--line)}
.side .lbl{font-size:9.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--mut);margin-bottom:3px;display:flex;align-items:center;gap:6px}
.side.us .lbl{color:var(--gold)}
.btag{font-size:9px;font-weight:700;color:#fff;border-radius:4px;padding:1px 5px}
.btag.Sontay{background:var(--son)}.btag.Belimo{background:var(--bel)}
.side .pn{font-family:var(--mono);font-weight:700;font-size:14.5px;color:var(--ink);word-break:break-word;line-height:1.3}
.side.us .pn{color:var(--navy2)}
.side .sp{font-size:11px;color:var(--mut);margin-top:5px;line-height:1.45}
.vbar{padding:8px 14px;font-size:11px;font-weight:700;letter-spacing:.3px}
.vbar.win{background:var(--winbg);color:var(--win)}.vbar.amb{background:var(--ambbg);color:var(--amb)}.vbar.resp{background:var(--negbg);color:var(--neg)}
.diffs{padding:11px 14px 2px}
.dgrp{margin-bottom:10px}
.dgrp .dh{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.dgrp.p .dh{color:var(--win)}.dgrp.n .dh{color:var(--neu)}.dgrp.m .dh{color:var(--neg)}
.dgrp ul{list-style:none}.dgrp li{font-size:12.5px;line-height:1.5;padding:2px 0 2px 17px;position:relative}
.dgrp.p li:before{content:"+";position:absolute;left:2px;color:var(--win);font-weight:700}
.dgrp.n li:before{content:"=";position:absolute;left:2px;color:var(--neu);font-weight:700}
.dgrp.m li:before{content:"\2212";position:absolute;left:3px;color:var(--neg);font-weight:700}
.sec{margin:2px 14px 10px;border:1px solid var(--line);border-radius:11px;overflow:hidden}
.sec .sh{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:8px 12px;background:#F1F3F6;color:var(--mut);display:flex;gap:6px;cursor:pointer}
.sec.gold .sh{background:#FCF7E8;color:#8A6D0B}
.sec .sh .tog{margin-left:auto;transition:transform .15s}
.sec.closed .tog{transform:rotate(-90deg)}
.sec.closed .pillwrap{display:none}
.pillwrap{padding:9px 12px}
.pill{display:inline-block;font-family:var(--mono);font-size:11px;font-weight:600;color:var(--navy2);background:#F1F3F6;border:1px solid var(--line);border-radius:6px;padding:3px 8px;margin:2px 4px 2px 0;cursor:pointer}
.pill.hit{background:var(--winbg);border-color:#BFE6CF;color:var(--win);font-weight:800}
.pill.pro{background:#FCF7E8;border-color:#EBDCA8;color:#8A6D0B}
.pill.more{color:var(--mut);background:none;border:none;cursor:default}
.obj{margin:2px 14px 12px;background:var(--paper);border-radius:11px;padding:10px 12px}
.obj .oq{font-size:12px;font-weight:600;color:var(--mut)}.obj .oa{font-size:12.5px;margin-top:3px;line-height:1.5}
.foot{display:flex;gap:8px;padding:0 14px 13px}
.btn{font-size:12px;font-weight:600;padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:#fff;color:var(--navy2);cursor:pointer;font-family:var(--sans)}
.btn.primary{background:var(--navy2);color:#fff;border-color:var(--navy2)}
.empty{padding:32px 20px;text-align:center;color:var(--mut);font-size:14px;line-height:1.6}.empty b{color:var(--ink)}

.drow .dn{margin-left:auto;font-size:10px;color:var(--mut);font-family:var(--mono);background:var(--paper);border-radius:6px;padding:2px 7px}
.chev{color:#C4CBD6}
.askrow{padding:0 16px 10px}
.askwrap{display:flex;gap:8px}
#ask{flex:1;padding:13px 14px;font-size:16px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--ink);outline:none;font-family:var(--sans)}

.ans.ok .ah{background:var(--winbg);color:var(--win)}
.ans.warn .ah{background:var(--ambbg);color:var(--amb)}
.ans.no .ah{background:var(--negbg);color:var(--neg)}
.prow{display:flex;align-items:baseline;gap:10px;padding:11px 14px;border-bottom:1px solid var(--line)}
.prow:last-child{border-bottom:none}
.prow .pc{font-family:var(--mono);font-weight:700;font-size:13.5px;color:var(--navy2);white-space:nowrap}

@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

 var sieHits={};if(q.length>=3)SIEKEYS.forEach(function(k){if(k.indexOf(q)>-1){var e=SIE[k];if(!sieHits[e.fam])sieHits[e.fam]=e;}});

 var fids={};Object.keys(sieHits).forEach(function(k){fids[k]=1;});Object.keys(partHits).forEach(function(k){fids[k]=1;});

 list.sort(function(a,b){var ea=partHits[a]&&partHits[a].some(function(p){return p.n===q;})?-1:0,eb=partHits[b]&&partHits[b].some(function(p){return p.n===q;})?-1:0;return ea-eb;});
 $("#counthint").innerHTML=list.length+" categor"+(list.length===1?"y":"ies")+' for \u201c'+esc(raw)+'\u201d';

  if(exact&&exact.f===fid){o.qhit=exact.c;o.qdesc=exact.d;o.qbrand=exact.b;}
  else if(sieHits[fid]&&!partHits[fid]){o.qhit=sieHits[fid].si;o.qdesc="Siemens";o.qbrand="Siemens";}
  return card(fid,o);}).join("");

var SYN={
 "flow switch":["flow switch","flowswitch","paddle","flow sw"],
 "level":["level switch","tank level","liquid level","hydrostatic"],
 "power":["power monitor","current switch","energy meter","kwh","power monitoring"],
 "gas":["gas leak","refrigerant leak","lpg"],

};
var MODS={liquid:["liquid","water","hydronic","glycol","bsp","paddle","pipe"],air:["air","duct","ventilation","ahu"],
 room:["room","space","wall"],duct:["duct"],outdoor:["outdoor","outside","external"],
 modbus:["modbus"],bacnet:["bacnet"],display:["display","lcd","screen"],wireless:["wireless","battery"],

function findProducts(raw){
 var q=" "+raw.toLowerCase()+" ",intent=null,k;
 for(k in SYN){if(SYN[k].some(function(s){return q.indexOf(s)>-1;})){intent=k;break;}}
 var isLiquid=MODS.liquid.some(function(m){return q.indexOf(m)>-1;});
 var isAir=MODS.air.some(function(m){return q.indexOf(m)>-1;});
 if(q.indexOf("flow")>-1&&isLiquid&&!isAir)intent="flow switch";
 if(intent==="airflow"&&isLiquid&&q.indexOf("switch")>-1)intent="flow switch";
 if(intent&&NOEQ[intent]){var n=NOEQ[intent];
  return {kind:"no",title:n.t,msg:n.msg,items:PRO.filter(function(p){return n.alt.indexOf(p.c)>-1;})};}
 if(intent==="flow switch"){
  var sf=PRO.filter(function(p){return p.c==="SF1K";});

   items:sf.concat(alt)};}
 var toks=q.split(/[^a-z0-9\u2082".]+/).filter(function(t){return t.length>1;});
 var scored=PRO.map(function(p){var s=0,tg=p.t||[];

   if((p.c+" "+p.d+" "+p.cat).toLowerCase().indexOf(t)>-1)s+=1.5; });
  for(var m in MODS){ if(MODS[m].some(function(x){return q.indexOf(x)>-1;})&&tg.indexOf(m)>-1)s+=3; }

  if(intent==="leak"){ if(/^(VVK|LPH|VVA|VVN)/i.test(p.c))s+=8; if(/^KEK/i.test(p.c))s-=4; }
